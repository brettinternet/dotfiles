# About tmux options: https://superuser.com/a/759156/741304


# -- General ----------------------------------------

# use C-a, since it's on the home row and easier to hit than C-b
set-option -g prefix C-a
unbind C-a
bind C-a send-prefix

# Keep your finger on ctrl, or don't
bind ^D detach-client

# -- Navigation ----------------------------------------

# set first window to index 1 (not 0) to map more to the keyboard layout...
set-option -g base-index 1
set-window-option -g pane-base-index 1

# Use vi keybindings for tmux commandline input.
# Note that to get command mode you need to hit ESC twice...
set-option -g status-keys vi

# Use vi keybindings in copy and choice modes
set-window-option -g mode-keys vi

bind space next-window
bind bspace previous-window
bind enter next-layout

# use vim-like keys for splits and windows
bind v split-window -h -c "#{pane_current_path}"
bind V split-window -hb -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind S split-window -vb -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R


# -- Layout ----------------------------------------

# Pane resize in all four directions using vi bindings.
# with shift
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
# with alt
bind -r M-h resize-pane -L 20
bind -r M-j resize-pane -D 20
bind -r M-k resize-pane -U 20
bind -r M-l resize-pane -R 20

# Smart pane switching with awareness of vim splits.
# Source: https://github.com/christoomey/vim-tmux-navigator
# is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?x?)(diff)?$"'
# bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
# bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
# bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
# bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
# bind -n C-\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

bind C-o rotate-window

bind + select-layout main-horizontal
bind = select-layout main-vertical
set-window-option -g other-pane-height 25
set-window-option -g other-pane-width 80

# New windows/pane in $PWD
bind c new-window -c "#{pane_current_path}"
bind C-c respawn-pane

bind X kill-pane
bind & kill-window



# -- Copy  ----------------------------------------

bind [ copy-mode
bind -T copy-mode-vi v send -X begin-selection
if-shell 'uname | grep -q Darwin' \
  'bind -T copy-mode-vi y send -X copy-pipe "pbcopy"' \
  'bind -T copy-mode-vi y send -X copy-pipe "xclip -selection clipboard"'
bind ] paste-buffer

bind b choose-buffer


# -- System ----------------------------------------

# Keep panes around after crashes, but close them after clean exits.
set-option -g remain-on-exit failed

# Easy config reload
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded!"

set-option -g default-terminal "tmux-256color"
set-option -g terminal-features "xterm*:clipboard:ccolour:cstyle:focus:title,screen*:title,rxvt*:ignorefkeys,xterm-256color:RGB,tmux-256color:RGB"
set -g allow-passthrough on
# Preserve modern modifier key sequences (e.g. Alt+Enter) through tmux instead of
# degrading them to legacy Esc-prefixed keys.
set -s extended-keys always
set -s extended-keys-format csi-u
set -as terminal-features ',xterm*:extkeys'
# iTerm2 may send Return modifiers in legacy forms; normalize them to CSI-u
# sequences Oh My Pi recognizes for newline handling.
bind-key -n S-Enter send-keys -l "\033[13;2u"
bind-key -n M-Enter send-keys -l "\033[13;3u"

bind : command-prompt
bind R refresh-client
bind L clear-history

# Bigger history
set-option -g history-limit 10000
# Prefer app-provided terminal titles for tmux window labels. Manual
# rename-window turns automatic-rename off, so explicit names still win.
set-option -g @window-title-format "#{?#{&&:#{automatic-rename},#{&&:#{pane_title},#{&&:#{!=:#{pane_title},#{host}},#{!=:#{pane_title},#{host_short}}}}},#{pane_title},#W}"

set-option -g set-titles on
set-option -g set-titles-string "#{E:@window-title-format}"

# No escape time for vi mode
set-option -sg escape-time 0

# Display numbers timeout with `prefix + q`
set-window-option -g display-panes-time 5000

# Allow repeatable key bindings like `prefix H H H` for pane resizing.
set-option -g repeat-time 400

# Set window notifications
set-window-option -g monitor-activity on
set-option -g visual-activity on

# Mouse
set-option -g mouse on

# Emulate scrolling by sending up and down keys if these commands are running in the pane
tmux_commands_with_legacy_scroll="nano less more man git"

bind-key -T root WheelUpPane \
  if-shell -Ft= '#{?mouse_any_flag,1,#{pane_in_mode}}' \
    'send -Mt=' \
    'if-shell -t= "#{?alternate_on,true,false} || echo \"#{tmux_commands_with_legacy_scroll}\" | grep -q \"#{pane_current_command}\"" \
    "send -t= Up" "copy-mode -et="'

bind-key -T root WheelDownPane \
  if-shell -Ft = '#{?pane_in_mode,1,#{mouse_any_flag}}' \
    'send -Mt=' \
    'if-shell -t= "#{?alternate_on,true,false} || echo \"#{tmux_commands_with_legacy_scroll}\" | grep -q \"#{pane_current_command}\"" \
    "send -t= Down" "send -Mt="'


# -- Source ----------------------------------------

# Local config
if-shell "[ -f ~/.tmux.conf.local ]" 'source ~/.tmux.conf.local'


# -- Colorscheme ----------------------------------------

# Use only terminal ANSI palette slots so tmux follows the active iTerm theme.
# Kitty Default: black background, bright blue active window, magenta session, cyan host.
set-option -g status "on"

# default statusbar color
set-option -g status-style bg=colour0,fg=colour7

# default window title colors
set-window-option -g window-status-style bg=colour0,fg=colour8

# default window with an activity alert
set-window-option -g window-status-activity-style bg=colour0,fg=colour11,bold

# active window title colors
set-window-option -g window-status-current-style bg=colour4,fg=colour15,bold

# pane border
set-option -g pane-active-border-style fg=colour12
set-option -g pane-border-style fg=colour8

# message infos
set-option -g message-style bg=colour14,fg=colour0

# writing commands inactive
set-option -g message-command-style bg=colour8,fg=colour15

# pane number display
set-option -g display-panes-active-colour colour12
set-option -g display-panes-colour colour8

# clock
set-window-option -g clock-mode-colour colour12

# bell
set-window-option -g window-status-bell-style bg=colour1,fg=colour15

set-option -g status-justify "left"
set-option -g status-left-style none
set-option -g status-left-length "80"
set-option -g status-right-style none
set-option -g status-right-length "80"
set-window-option -g window-status-separator ""

set-option -g status-left "#[fg=colour15,bg=colour8,bold] #S #[fg=colour8,bg=colour0,nobold,noitalics,nounderscore]"
set-option -g status-right "#[fg=colour8,bg=colour0,nobold,noitalics,nounderscore]#[fg=colour15,bg=colour8] %Y-%m-%d  %H:%M #[fg=colour6,bg=colour8,nobold,noitalics,nounderscore]#[fg=colour0,bg=colour6,bold] #h "

set-window-option -g window-status-current-format "#[fg=colour15,bg=colour4,bold] #I  #{E:@window-title-format} #[fg=colour4,bg=colour0,nobold,noitalics,nounderscore]"
set-window-option -g window-status-format "#[fg=colour8,bg=colour0] #I  #{E:@window-title-format} "


# -- Plugins ----------------------------------------

# Self update
# https://github.com/tmux-plugins/tpm
set -g @plugin 'tmux-plugins/tpm'

# https://github.com/tmux-plugins/tmux-resurrect
set -g @plugin 'tmux-plugins/tmux-resurrect'
# https://github.com/tmux-plugins/tmux-continuum
set -g @plugin 'tmux-plugins/tmux-continuum'
# https://github.com/tmux-plugins/tmux-logging
set -g @plugin 'tmux-plugins/tmux-logging'

# tmux conditionals: https://stackoverflow.com/a/40902312
if-shell -b '[ -f ~/.tmux/plugins/tpm/tpm ]' \
  "run '~/.tmux/plugins/tpm/tpm'"
