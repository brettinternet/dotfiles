include = ["city.local.toml"]

[workspace]
# gc 1.3.5 stores workspace.name and workspace.prefix in .gc/site.toml.
# timezone is not a supported field in the installed config schema.
provider = "omp"
max_active_sessions = 2

[providers]
[providers.codex]
base = "builtin:codex"
ready_delay_ms = 0

[providers.omp]
base = "builtin:omp"
ready_delay_ms = 0

[providers.claude]
base = "builtin:claude"
ready_delay_ms = 0

[providers.pi]
base = "builtin:pi"
ready_delay_ms = 0
