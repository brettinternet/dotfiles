include = ["city.local.toml"]

[workspace]
provider = "omp"
max_active_sessions = 2

[providers]
[providers.claude]
base = "builtin:claude"
ready_delay_ms = 0
[providers.codex]
base = "builtin:codex"
ready_delay_ms = 0
[providers.omp]
base = "builtin:omp"
ready_delay_ms = 0
[providers.pi]
base = "builtin:pi"
ready_delay_ms = 0

[[rigs]]
name = "fixture"
prefix = "fx"
default_branch = "main"
suspended_on_start = true

[[patches.agent]]
name = "control-dispatcher"
dir = "fixture"
min_active_sessions = 1
