---
version: "3"

tasks:
  init:
    desc: Install Gas City dependencies and run diagnostics
    cmds:
      - mise install -q
      - task: doctor

  up:
    desc: Start the Gas City supervisor-managed city
    cmds:
      - mise exec -- gc start

  down:
    desc: Stop the Gas City city
    cmds:
      - mise exec -- gc stop

  status:
    desc: Show Gas City city status
    cmds:
      - mise exec -- gc status

  doctor:
    desc: Run Gas City diagnostics
    cmds:
      - mise exec -- gc doctor

  sidecar:serve:
    desc: Run the Gas City sidecar HTTP service
    cmds:
      - uv run --project sidecar gascity-sidecar serve

  sidecar:test:
    desc: Run focused sidecar tests
    cmds:
      - uv run --project sidecar pytest

  demo:
    desc: Run the GC-11 happy-path demo
    cmds:
      - ./assets/scripts/gc11-demo.sh happy

  demo:repair:
    desc: Run the GC-11 bounded repair demo
    cmds:
      - ./assets/scripts/gc11-demo.sh repair

  demo:halt:
    desc: Run the GC-11 expected exhaustion demo
    cmds:
      - ./assets/scripts/gc11-demo.sh halt

  demo:reset:
    desc: Reset only beads recorded by the GC-11 demo
    cmds:
      - ./assets/scripts/gc11-demo.sh reset
