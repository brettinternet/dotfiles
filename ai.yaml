---
- defaults:
    link:
      create: true
      relink: true

- shell:
    - command: |
        set -eu
        profile="$(ai/.bin/pi-profile show | cut -f1)"
        ai/.bin/pi-profile use "$profile"
      description: Regenerate active pi profile config from common + overlay
      stdout: true
      stderr: true
    - command: |
        set -eu
        DOTFILES="$(pwd -P)"
        for src in "$DOTFILES/ai/pi/profiles"/*.yml; do
          [ -f "$src" ] || continue
          name="$(basename "$src" .yml)"
          dir="$HOME/.omp/profiles/$name/agent"
          mkdir -p "$dir"
          ln -sfn "$src" "$dir/config.yml"
        done
      description: Symlink pi profiles into ~/.omp/profiles/*/agent/config.yml
      stdout: true
      stderr: true

    - command: |
        set -eu
        mkdir -p "$HOME/.claude"
        target="$HOME/.claude/settings.json"
        if [ -L "$target" ]; then
          rm "$target"
        fi
        if [ -e "$target" ] && [ ! -f "$target" ]; then
          printf 'Claude settings target exists but is not a regular file: %s\n' "$target" >&2
          exit 1
        fi
        if [ ! -e "$target" ]; then
          cp ai/claude/settings.json "$target"
        fi
      description: Seed Claude Code settings as a local copy
      stdout: true
      stderr: true
    - command: ai/.bin/install-codex-command-skills
      description: Generate explicit-only Codex skills from shared commands
      stdout: true
      stderr: true
    - command: ai/.bin/install-codex-agents
      description: Generate Codex agent profiles from Claude agent definitions
      stdout: true
      stderr: true

- link:
    ~/.bin/:
      glob: true
      path: ai/.bin/*
    # Claude
    ~/.claude/CLAUDE.md:
      path: ai/AGENTS.md
    ~/.claude/statusline-command.sh:
      path: ai/claude/statusline-command.sh
    ~/.claude/commands/:
      glob: true
      path: ai/commands/*
    ~/.claude/agents/:
      glob: true
      path: ai/claude/agents/*
    ~/.claude/skills/:
      glob: true
      path: ai/skills/*
    # Codex
    ~/.codex/AGENTS.md:
      path: ai/AGENTS.md
    ~/.agents/skills/:
      glob: true
      path: ai/skills/*
    # pi
    # OMP already reads ~/.claude/CLAUDE.md
    ~/.omp/agent/config.yml:
      path: ai/pi/config.yml
    ~/.omp/agent/skills:
      path: ai/skills
    ~/.omp/agents/:
      glob: true
      path: ai/pi/agents/*
    # OpenCode
    # ~/.config/opencode/AGENTS.md:
    #   path: ai/AGENTS.md
    # ~/.config/opencode/opencode.jsonc:
    #   path: ai/opencode/opencode.jsonc
    # ~/.config/opencode/ocx.jsonc:
    #   path: ai/opencode/ocx.jsonc
    # ~/.config/opencode/tui.jsonc:
    #   path: ai/opencode/tui.jsonc
    # ~/.config/opencode/commands/:
    #   glob: true
    #   path: ai/commands/*
    # ~/.config/opencode/agents/:
    #   glob: true
    #   path: ai/opencode/agents/*
    # ~/.config/opencode/profiles/:
    #   glob: true
    #   path: ai/opencode/registry/files/profiles/*
