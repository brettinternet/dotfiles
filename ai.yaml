---
- defaults:
    link:
      create: true
      relink: true

- link:
    # Claude
    ~/.claude/CLAUDE.md:
      path: ai/AGENTS.md
    ~/.claude/settings.json:
      path: ai/claude/settings.json
    ~/.claude/statusline-command.sh:
      path: ai/claude/statusline-command.sh
    ~/.claude/commands/:
      glob: true
      path: ai/commands/*
    ~/.claude/agents/:
      glob: true
      path: ai/claude/agents/*
    # Codex
    ~/.codex/AGENTS.md:
      path: ai/AGENTS.md
    # pi
    ~/.omp/agent/config.yml:
      path: ai/pi/config.yml
      # OMP already reads ~/.claude/CLAUDE.md
    # OpenCode
    ~/.config/opencode/AGENTS.md:
      path: ai/AGENTS.md
    ~/.config/opencode/opencode.jsonc:
      path: ai/opencode/opencode.jsonc
    ~/.config/opencode/ocx.jsonc:
      path: ai/opencode/ocx.jsonc
    ~/.config/opencode/tui.jsonc:
      path: ai/opencode/tui.jsonc
    ~/.config/opencode/commands/:
      glob: true
      path: ai/commands/*
    ~/.config/opencode/agents/:
      glob: true
      path: ai/opencode/agents/*
    ~/.config/opencode/profiles/:
      glob: true
      path: ai/opencode/registry/files/profiles/*
