---
- defaults:
    link:
      create: true
      relink: true

- shell:
    - command: |
        set -eu
        if [ ! -e ai/pi/config.yml ]; then
          profile="$(cat ai/pi/.active 2>/dev/null || echo personal)"
          target="ai/pi/profiles/${profile}.yml"
          if [ ! -f "$target" ]; then
            printf 'pi-profile: profile %s missing; falling back to personal\n' "$profile" >&2
            profile=personal
            target="ai/pi/profiles/personal.yml"
          fi
          ln -sfn "profiles/${profile}.yml" ai/pi/config.yml
          printf '%s\n' "$profile" > ai/pi/.active
        fi
      description: Initialize pi profile symlink
      stdout: true
      stderr: true
    - command: |
        set -eu
        DOTFILES="$(pwd -P)"
        for src in "$DOTFILES/ai/pi/profiles"/*.yml; do
          [ -f "$src" ] || continue
          name="$(basename "$src" .yml)"
          dir="$HOME/.omp/profiles/$name/agent"
          mkdir -p "$dir"
          ln -sfn "$src" "$dir/config.yml"
        done
      description: Symlink pi profiles into ~/.omp/profiles/*/agent/config.yml
      stdout: true
      stderr: true

- link:
    ~/.bin/:
      glob: true
      path: ai/.bin/*
    # Claude
    ~/.claude/CLAUDE.md:
      path: ai/AGENTS.md
    ~/.claude/settings.json:
      path: ai/claude/settings.json
    ~/.claude/statusline-command.sh:
      path: ai/claude/statusline-command.sh
    ~/.claude/commands/:
      glob: true
      path: ai/commands/*
    ~/.claude/agents/:
      glob: true
      path: ai/claude/agents/*
    ~/.claude/skills/:
      glob: true
      path: ai/skills/*
    # Codex
    ~/.codex/AGENTS.md:
      path: ai/AGENTS.md
    # pi
    # OMP already reads ~/.claude/CLAUDE.md
    ~/.omp/agent/config.yml:
      path: ai/pi/config.yml
    ~/.omp/agent/skills:
      path: ai/skills
    ~/.omp/agent/agents/:
      glob: true
      path: ai/pi/agents/*
    # OpenCode
    # ~/.config/opencode/AGENTS.md:
    #   path: ai/AGENTS.md
    # ~/.config/opencode/opencode.jsonc:
    #   path: ai/opencode/opencode.jsonc
    # ~/.config/opencode/ocx.jsonc:
    #   path: ai/opencode/ocx.jsonc
    # ~/.config/opencode/tui.jsonc:
    #   path: ai/opencode/tui.jsonc
