---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

includes:
  setup: Taskfile.{{OS}}.yaml
  gascity:
    taskfile: ai/gascity/Taskfile.yaml
    dir: ai/gascity
    dotenv: [".env"]

tasks:
  default:
    silent: true
    cmds:
      - task -l

  init:
    desc: Install dependencies and setup environment
    aliases: [setup]
    cmds:
      - task: setup:init
      - task: mise
      - task: direnv
      - task: lefthook

  mise:
    desc: Install workstation dependencies
    cmds:
      - mise trust -q -a
      - mise install -q
    preconditions:
      - sh: command -v mise
        msg: Mise is not installed

  direnv:
    desc: Run direnv hooks
    cmd: direnv allow .
    status:
      - '[ -x "$(command -v direnv)" ]'
      - "[[ $(direnv status --json | jq '.state.foundRC.allowed') == 0 ]]"
      - "[[ $(direnv status --json | jq '.state.loadedRC.allowed') == 0 ]]"

  lefthook:
    desc: Install Lefthook
    cmds:
      - lefthook install
    preconditions:
      - command -v lefthook
      - test -f lefthook.yaml

  check:
    desc: Run checks on tracked files
    cmds:
      - git diff --check
      - task: check-files
        vars:
          FILES_CMD: git ls-files -z

  check-staged:
    desc: Run checks on staged files
    cmds:
      - git diff --cached --check
      - task: check-files
        vars:
          FILES_CMD: git diff --cached --name-only --diff-filter=ACMR -z

  check-files:
    internal: true
    cmds:
      - |
        bash -euo pipefail -c '
          posix_shell_files=()
          shell_files=()
          zsh_files=()
          lua_files=()
          nvim_lua_files=()
          format_files=()

          while IFS= read -r -d "" file; do
            [[ -e "$file" || -L "$file" ]] || continue
            case "$file" in
              base/.profile)
                posix_shell_files+=("$file")
                ;;
              *.sh|*.bash|*.ksh|*.bashrc|*.bash_profile|*.bash_login|*.bash_logout)
                shell_files+=("$file")
                ;;
              *.zsh|*/.zprofile|.zprofile|*/.zshrc|.zshrc|*/.zshrc.*|.zshrc.*)
                zsh_files+=("$file")
                ;;
              *.lua)
                lua_files+=("$file")
                case "$file" in
                  base/.config/nvim/*)
                    nvim_lua_files+=("$file")
                    ;;
                esac
                ;;
              *.yaml|*.yml|*.json|*.jsonc)
                format_files+=("$file")
                ;;
            esac
          done < <({{.FILES_CMD}})

          if ((${#posix_shell_files[@]})); then
            shellcheck -s sh -- "${posix_shell_files[@]}"
          fi
          if ((${#shell_files[@]})); then
            shellcheck -- "${shell_files[@]}"
          fi
          for file in "${zsh_files[@]}"; do
            zsh -n -- "$file"
          done
          if ((${#lua_files[@]})); then
            stylua --check -- "${lua_files[@]}"
          fi
          if ((${#nvim_lua_files[@]})); then
            selene --config base/.config/nvim/selene.toml -- "${nvim_lua_files[@]}"
          fi
          if ((${#format_files[@]})); then
            prettier --check --ignore-unknown -- "${format_files[@]}"
          fi
        '
  test:
    desc: Run tests
    cmds:
      - git submodule update --init dotbot
      - task: test-dotbot
      - python3 ai/tests/test_worklease.py

  test-dotbot:
    internal: true
    dir: dotbot
    cmds:
      - hatch test

  fix:
    desc: Format tracked files
    cmds:
      - task: fix-files
        vars:
          FILES_CMD: git ls-files -z

  fix-files:
    internal: true
    cmds:
      - |
        bash -euo pipefail -c '
          lua_files=()
          format_files=()

          while IFS= read -r -d "" file; do
            [[ -e "$file" || -L "$file" ]] || continue
            case "$file" in
              *.lua)
                lua_files+=("$file")
                ;;
              *.yaml|*.yml|*.json|*.jsonc)
                format_files+=("$file")
                ;;
            esac
          done < <({{.FILES_CMD}})

          if ((${#lua_files[@]})); then
            stylua -- "${lua_files[@]}"
          fi
          if ((${#format_files[@]})); then
            prettier --write --ignore-unknown -- "${format_files[@]}"
          fi
        '

  update:
    desc: Update dependencies
    cmds:
      - mise update -q
      - git submodule foreach git pull

  build-opencode-registry:
    desc: Build OpenCode registry
    cmds:
      - bun --cwd ./ai/opencode/registry run build

  start-opencode-registry:
    desc: Start OpenCode registry
    cmds:
      - bun --cwd ./ai/opencode/registry run preview
