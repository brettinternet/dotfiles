---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

includes:
  setup: Taskfile.{{OS}}.yaml

tasks:
  default:
    silent: true
    cmds:
      - task -l

  init:
    desc: Install dependencies and setup environment
    aliases: [setup]
    cmds:
      - task: setup:init
      - task: mise
      - task: direnv
      - task: lefthook

  mise:
    desc: Install workstation dependencies
    cmds:
      - mise trust -q -a
      - mise install -q
    preconditions:
      - sh: command -v mise
        msg: Mise is not installed

  direnv:
    desc: Run direnv hooks
    cmd: direnv allow .
    status:
      - '[ -x "$(command -v direnv)" ]'
      - "[[ $(direnv status --json | jq '.state.foundRC.allowed') == 0 ]]"
      - "[[ $(direnv status --json | jq '.state.loadedRC.allowed') == 0 ]]"

  lefthook:
    desc: Install Lefthook
    cmds:
      - lefthook install
    preconditions:
      - command -v lefthook
      - test -f lefthook.yaml

  check:
    desc: Run checks
    cmds:
      - yamllint .
      - >-
        find . -type f
        \( -name '*.sh' -o -name '*.bash' -o -name '*.ksh' -o -name '*.bashrc'
        -o -name '*.bash_profile' -o -name '*.bash_login' -o -name '*.bash_logout' \)
        -not -path "./dotbot/*"
        | xargs shellcheck
      - dprint check
      - prettier --check "**/*.{yaml,yml}"

  fix:
    desc: Run fixes
    cmds:
      - dprint fmt
      - prettier --write "**/*.{yaml,yml}"

  update:
    desc: Update dependencies
    cmds:
      - mise update -q
      - git submodule foreach git pull
