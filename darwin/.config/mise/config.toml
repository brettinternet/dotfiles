[tools]
ast-grep = "latest"
biome = "latest"
bun = "latest"
cosign = "latest"
claude = "latest"
colima = "latest"
docker-cli = "latest"
docker-compose = { version = "latest", postinstall = "mkdir -p ~/.docker/cli-plugins && ln -sf $(command -v docker-cli-plugin-docker-compose) ~/.docker/cli-plugins/docker-compose" }
fd = "latest"
fzf = "latest"
gh = "latest"
go = "latest"
k9s = "latest"
lima = "latest"
lsd = "latest"
node = "latest"
opencode = "latest"
python = "latest"
rust = "latest"
rg = "latest"
slsa-verifier = "latest"
sops = "latest"
task = "latest"
uv = "latest"

[settings]
disable_backends = ["asdf", "pipx"]
pipx.uvx = true
npm.bun = true
experimental = true
