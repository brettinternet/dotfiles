---
name: Lint

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Check formatting
        run: bunx prettier --check "**/*.{yaml,yml,json,jsonc}"

  shell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ShellCheck
        run: |
          find . -type f \
            \( -name '*.sh' -o -name '*.bash' -o -name '*.ksh' \
            -o -name '*.bashrc' -o -name '*.bash_profile' \
            -o -name '*.bash_login' -o -name '*.bash_logout' \) \
            -not -path "./dotbot/*" | xargs shellcheck
