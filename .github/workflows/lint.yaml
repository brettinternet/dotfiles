---
name: Lint

on: # yamllint disable-line rule:truthy
  pull_request:
  push:

permissions:
  contents: read

jobs:
  yaml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Install dependencies
        run: pip3 install yamllint

      - name: Lint yaml
        run: yamllint .

  shell:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ShellCheck
        run: |
          find . -type f \
            \( -name '*.sh' -o -name '*.bash' -o -name '*.ksh' \
            -o -name '*.bashrc' -o -name '*.bash_profile' \
            -o -name '*.bash_login' -o -name '*.bash_logout' \) \
            -not -path "./dotbot/*" | xargs shellcheck
