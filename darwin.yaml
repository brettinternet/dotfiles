---
- defaults:
    link:
      create: true
      relink: true

- create:
    - ~/dev
    - ~/dev/me
    - ~/dev/sandbox
    - ~/dev/work

- link:
    ~/.gitconfig:
      path: darwin/.gitconfig
    ~/.zprofile:
      path: darwin/.zprofile
    ~/.hushlogin:
      path: darwin/.hushlogin
    ~/.aerospace.toml:
      path: darwin/.aerospace.toml
    ~/.functions/:
      glob: true
      path: darwin/.functions/*
    ~/.zshrc.darwin:
      path: darwin/.zshrc.darwin
    ~/.hammerspoon/:
      glob: true
      path: darwin/.hammerspoon/*
    ~/.config/ghostty/:
      glob: true
      path: darwin/.config/ghostty/*
      if: '[ -x "$(command -v ghostty)" ]'
    ~/.config/mise/config.toml:
      path: darwin/.config/mise/config.toml
      if: '[ -x "$(command -v mise)" ]'
    ~/.config/nix-darwin/:
      glob: true
      path: darwin/.config/nix-darwin/*
      if: '[ -x "$(command -v nix)" ]'

- shell:
    - ["ln -s $(which docker-cli-plugin-docker-compose) ~/.docker/cli-plugins/docker-compose"]
    - ["./darwin/setup.sh"]
    # - ['[ -x "$(command -v nix)" ] && ./nix/setup.sh']
