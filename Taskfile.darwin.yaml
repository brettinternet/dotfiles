---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  BREWFILE: "{{.ROOT_DIR}}/darwin/Brewfile"
  BREW_SH: "{{.ROOT_DIR}}/darwin/setup.sh"

tasks:
  init:
    desc: Darwin setup
    cmds:
      - task: brew

  brew:
    desc: Install workstation dependencies with Brew
    cmd: "{{.BREW_SH}}"
    preconditions:
      - { msg: "Missing Brewfile", sh: "test -f {{.BREWFILE}}" }
