---
# https://github.com/anishathalye/dotbot/tree/master#directives

- defaults:
    link:
      create: true
      relink: true

- clean:
    - "~"
    - "~/.config"
    - "~/.functions"
    - "~/.bin"

- link:
    ~/.bash_profile:
      path: base/.bash_profile
      force: true
    ~/.bashrc:
      path: base/.bashrc
      force: true
    ~/.dircolors:
      path: base/.dircolors
      if: "command -v dircolors >/dev/null 2>&1"
    ~/.zshrc:
      path: base/.zshrc
      if: '[ -x "$(command -v zsh)" ]'
      force: true
    ~/.editorconfig:
      path: base/.editorconfig
    ~/.profile:
      path: base/.profile
    ~/.vimrc:
      path: base/.vimrc
      force: true
      if: '[ -x "$(command -v vim)" ]'
    ~/.vimrc.bundles:
      path: base/.vimrc.bundles
      if: '[ -x "$(command -v vim)" ]'
    ~/.tmux.conf:
      path: base/.tmux.conf
      if: '[ -x "$(command -v tmux)" ]'
    ~/.config/k9s/config.yaml:
      path: base/.config/k9s/config.yaml
      if: '[ "$(uname)" = Linux ] && [ -x "$(command -v kubectl)" ]'
    ~/.config/k9s/skins/skin.yaml:
      path: base/.config/k9s/skin.yaml
      if: '[ "$(uname)" = Linux ] && [ -x "$(command -v kubectl)" ]'
    ~/Library/Application Support/k9s/config.yaml:
      path: base/.config/k9s/config.yaml
      if: '[ "$(uname)" = Darwin ] && [ -x "$(command -v kubectl)" ]'
    ~/Library/Application Support/k9s/skins/skin.yaml:
      path: base/.config/k9s/skin.yaml
      if: '[ "$(uname)" = Darwin ] && [ -x "$(command -v kubectl)" ]'
    ~/.config/nvim:
      path: base/.config/nvim
      if: '[ -x "$(command -v nvim)" ]'
    ~/.bin/:
      glob: true
      path: base/.bin/*
    ~/.functions/:
      glob: true
      path: base/.functions/*
    ~/.functions/pacman.sh:
      path: base/platform/pacman.sh
      if: '[ "$(uname)" = Linux ] && [ -x "$(command -v pacman)" ]'
    ~/.zshrc.linux:
      path: base/platform/.zshrc.linux
      if: '[ "$(uname)" = Linux ]'

- shell:
    # Allow direnv access to ~/.envrc
    - ['[ -f "$HOME/.zinit/plugins/direnv---direnv/direnv" ] && direnv allow "$HOME" || true']
    - ['command -v zsh >/dev/null 2>&1 && zsh -ic "zinit self-update"']
    - ["command -v mise >/dev/null 2>&1 && mise self-update --yes --quiet || true"]
    - ["command -v mise >/dev/null 2>&1 && mise up --yes --quiet || true"]
    # - ['[ -x "$(command -v vim)" ] && /usr/bin/vim +PlugInstall +qall > /dev/null || true']
    - ['command -v nvim >/dev/null 2>&1 && nvim --headless "+Lazy! sync" -c "quitall" || true']
    - ["command -v doom >/dev/null 2>&1 && doom upgrade || true"]
    - command: |
        set -e

        if ! command -v tmux >/dev/null 2>&1; then
          exit 0
        fi

        tmux_was_running=0
        if tmux has-session >/dev/null 2>&1; then
          tmux_was_running=1
        else
          tmux start-server
          tmux new-session -d -s dotfiles-setup
        fi

        cleanup() {
          if [ "$tmux_was_running" -eq 0 ]; then
            tmux kill-server || true
          fi
        }
        trap cleanup EXIT

        tpm_dir="$HOME/.tmux/plugins/tpm"
        if [ -d "$tpm_dir" ] && ! git -C "$tpm_dir" remote get-url origin >/dev/null 2>&1; then
          rm -rf "$tpm_dir"
        fi

        if [ ! -x "$tpm_dir/tpm" ]; then
          git clone https://github.com/tmux-plugins/tpm "$tpm_dir"
        fi

        tmux set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"
        tmux source-file "$HOME/.tmux.conf"
        "$HOME/.tmux/plugins/tpm/bin/install_plugins"
        "$HOME/.tmux/plugins/tpm/bin/update_plugins" all
      description: Install tmux plugins
      stdout: true
      stderr: true
