---
# https://github.com/anishathalye/dotbot/tree/master#directives

- defaults:
    link:
      create: true
      relink: true

- clean:
    - "~"
    - "~/.config"
    - "~/.functions"
    - "~/.bin"

- link:
    ~/.bash_profile:
      path: base/.bash_profile
      force: true
    ~/.bashrc:
      path: base/.bashrc
      force: true
    ~/.dircolors:
      path: base/.dircolors
      if: "command -v dircolors >/dev/null 2>&1"
    ~/.zshrc:
      path: base/.zshrc
      if: '[ -x "$(command -v zsh)" ]'
      force: true
    ~/.editorconfig:
      path: base/.editorconfig
    ~/.profile:
      path: base/.profile
    ~/.vimrc:
      path: base/.vimrc
      force: true
      if: '[ -x "$(command -v vim)" ]'
    ~/.vimrc.bundles:
      path: base/.vimrc.bundles
      if: '[ -x "$(command -v vim)" ]'
    ~/.tmux.conf:
      path: base/.tmux.conf
      if: '[ -x "$(command -v tmux)" ]'
    ~/.config/k9s/config.yaml:
      path: base/.config/k9s/config.yaml
      if: '[ "$(uname)" = Linux ] && [ -x "$(command -v kubectl)" ]'
    ~/.config/k9s/skins/skin.yaml:
      path: base/.config/k9s/skin.yaml
      if: '[ "$(uname)" = Linux ] && [ -x "$(command -v kubectl)" ]'
    ~/Library/Application Support/k9s/config.yaml:
      path: base/.config/k9s/config.yaml
      if: '[ "$(uname)" = Darwin ] && [ -x "$(command -v kubectl)" ]'
    ~/Library/Application Support/k9s/skins/skin.yaml:
      path: base/.config/k9s/skin.yaml
      if: '[ "$(uname)" = Darwin ] && [ -x "$(command -v kubectl)" ]'
    ~/.config/nvim:
      path: base/.config/nvim
      if: '[ -x "$(command -v nvim)" ]'
    ~/.bin/:
      glob: true
      path: base/.bin/*
    ~/.functions/:
      glob: true
      path: base/.functions/*
    ~/.functions/pacman.sh:
      path: base/platform/pacman.sh
      if: '[ "$(uname)" = Linux ] && [ -x "$(command -v pacman)" ]'
    ~/.zshrc.linux:
      path: base/platform/.zshrc.linux
      if: '[ "$(uname)" = Linux ]'

- shell:
    # Allow direnv access to ~/.envrc
    - ['[ -f "$HOME/.zinit/plugins/direnv---direnv/direnv" ] && direnv allow "$HOME" || true']
    - ['[ -f "$HOME/.zinit/plugins/mise/mise" ] && chmod u+x "$HOME/.zinit/plugins/mise/mise" || true']
    - ['command -v zsh >/dev/null 2>&1 && zsh -ic "zinit self-update"']
    - [
        'mise_bin="$(command -v mise 2>/dev/null || true)"; [ -f "$mise_bin" ] && [ -x "$mise_bin" ] && mise self-update --yes --quiet || true',
      ]
    - ['mise_bin="$(command -v mise 2>/dev/null || true)"; [ -f "$mise_bin" ] && [ -x "$mise_bin" ] && mise up --yes --quiet || true']
    # - ['[ -x "$(command -v vim)" ] && /usr/bin/vim +PlugInstall +qall > /dev/null || true']
    - ['command -v nvim >/dev/null 2>&1 && nvim --headless "+Lazy! sync" -c "quitall" || true']
    - ["command -v doom >/dev/null 2>&1 && doom upgrade || true"]
    - command: |
        set -eu

        if ! command -v tmux >/dev/null 2>&1; then
          exit 0
        fi

        tmux_conf="$HOME/.tmux.conf"
        plugins_dir="$HOME/.tmux/plugins"

        if [ ! -f "$tmux_conf" ]; then
          exit 0
        fi

        mkdir -p "$plugins_dir"

        awk '/^[[:space:]]*set(-option)?[[:space:]]+-g[[:space:]]+@plugin[[:space:]]+/ {
          plugin = $4
          gsub(/["'"'"']/, "", plugin)
          print plugin
        }' "$tmux_conf" | while IFS= read -r plugin; do
          [ -n "$plugin" ] || continue

          plugin_name="${plugin##*/}"
          plugin_name="${plugin_name%.git}"
          plugin_dir="$plugins_dir/$plugin_name"

          case "$plugin" in
            *://*|git@*) plugin_url="$plugin" ;;
            *) plugin_url="https://github.com/$plugin" ;;
          esac

          if [ -d "$plugin_dir" ] && ! git -C "$plugin_dir" remote get-url origin >/dev/null 2>&1; then
            rm -rf "$plugin_dir"
          fi

          if [ -d "$plugin_dir" ]; then
            git -C "$plugin_dir" pull --ff-only --recurse-submodules
            git -C "$plugin_dir" submodule update --init --recursive
          else
            GIT_TERMINAL_PROMPT=0 git clone --single-branch --recursive "$plugin_url" "$plugin_dir"
          fi
        done
      description: Install tmux plugins
      stdout: true
      stderr: true
